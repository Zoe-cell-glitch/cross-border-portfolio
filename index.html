 <style>
 *{margin:0;padding:0;box-sizing:border-box}
 :root{--bg:#EEF2EC;--tx:#1C2E28;--ts:#5A7A6A;--p:#6BBF8A;--pl:rgba(107,191,138,0.1);--bd:rgba(28,46,40,0.05);--mw:1700px;--r:24px}
 html{scroll-behavior:smooth;background:var(--bg);overflow-x:hidden}

 @keyframes spin{0%{transform:rotate(0deg)}to{transform:rotate(360deg)}}
 @keyframes flt{0%,100%{transform:translateY(0)}50%{transform:translateY(-20px)}}
 @keyframes ml{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}
 @keyframes mr{0%{transform:translateX(-50%)}100%{transform:translateX(0)}}
@keyframes pulse{0%,100%{transform:scale(1);box-shadow:0 0 0 0 rgba(107,191,138,0.3)}50%{transform:scale(1.04);box-shadow:0 0 20px 4px rgba(107,191,138,0.15)}}

 @media(max-width:900px){.sc{padding:0 24px}}.hero-shape{will-change:transform}.marquee-img{will-change:transform}

 <body>
 <div class="curtain" id="curtain">
   <div class="curtain-l">
     <h2>Loading</h2>

   </div>

 <div id="root"></div>
 <script type="text/babel">
 const{useState,useEffect,useRef,useCallback}=React;
 /* === GSAP Integration - Hide elements on render === */
 function useGSAPHide(selector){
   useEffect(()=>{
     document.querySelectorAll(selector).forEach(el=>el.classList.add("gs_hide"));
   },[])
 }
 
 /* === FadeIn (fallback for non-GSAP elements) === */
 function FI({children,delay=0,y=30,x=0,duration=.7}){
   const ref=useRef(null);const[show,setShow]=useState(false);
   useEffect(()=>{
     const o=new IntersectionObserver(([e])=>{if(e.isIntersecting){setShow(true);o.disconnect()}},{threshold:0,margin:"50px"});
     if(ref.current)o.observe(ref.current);return()=>o.disconnect()
   },[]);
   return React.createElement("div",{ref,style:{transition:"all "+duration+"s cubic-bezier(.25,.1,.25,1)",transitionDelay:delay+"s",transform:show?"translateY(0) translateX(0)":"translateY("+y+"px) translateX("+x+"px)",opacity:show?1:0}},children)
 }
 
 /* === Magnet === */
 function MG({children,padding=100,strength=2}){
   const ref=useRef(null);
   const hM=useCallback(e=>{
     const el=ref.current;if(!el)return;
     const r=el.getBoundingClientRect();const x=e.clientX-r.left-r.width/2;const y=e.clientY-r.top-r.height/2;
     if(Math.sqrt(x*x+y*y)<padding)el.style.transform="translate3d("+(x/strength)+"px,"+(y/strength)+"px,0)";else el.style.transform="translate3d(0,0,0)"
   },[]);
   const hL=useCallback(()=>{if(ref.current)ref.current.style.transform="translate3d(0,0,0)"},[]);
   return React.createElement("div",{ref,onMouseMove:hM,onMouseLeave:hL,style:{transition:"transform .6s ease-in-out",willChange:"transform",display:"inline-block",cursor:"default"}},children)
 }
 
 /* === Contact Button === */
 const CB=({onClick,label="Contact Me"})=>React.createElement("button",{onClick,style:{padding:"14px 40px",borderRadius:50,border:"none",cursor:"pointer",fontFamily:"inherit",fontWeight:600,fontSize:"0.85rem",textTransform:"uppercase",letterSpacing:"0.15em",background:"linear-gradient(135deg, #1a3a2a, #6BBF8A)",color:"#fff",boxShadow:"0 4px 20px rgba(107,191,138,0.25)",transition:"all 0.3s ease"},onMouseEnter:e=>{e.target.style.transform="translateY(-2px)";e.target.style.boxShadow="0 8px 30px rgba(107,191,138,0.35)"},onMouseLeave:e=>{e.target.style.transform="translateY(0)";e.target.style.boxShadow="0 4px 20px rgba(107,191,138,0.25)"}},label);
 
 /* === Navbar === */
 function Navbar(){
   const[sc,setSc]=useState(false);
   useEffect(()=>{const h=()=>setSc(window.scrollY>80);window.addEventListener("scroll",h,{passive:true});return()=>window.removeEventListener("scroll",h)},[]);
   const scr=(id)=>document.getElementById(id)?.scrollIntoView({behavior:"smooth"});
    return(<nav style={{position:"fixed",top:0,left:0,right:0,zIndex:1e3,padding:sc?"16px 60px":"24px 60px",background:"rgba(238,242,236,0.78)",backdropFilter:"blur(20px)",WebkitBackdropFilter:"blur(20px)",borderBottom:sc?"1px solid var(--bd)":"1px solid rgba(28,46,40,0.04)",transition:"all 0.5s ease",display:"flex",justifyContent:"space-between",alignItems:"center",maxWidth:1700,margin:"0 auto"}}>
     <div className="navbar-logo" style={{fontSize:"1.3rem",fontWeight:700,color:"var(--p)",letterSpacing:"-0.02em"}}>跨境运营</div>
     <ul style={{display:"flex",gap:"48px",listStyle:"none",alignItems:"center"}}>
       {[{l:"About",t:"about"},{l:"Skills",t:"skills"},{l:"Honors",t:"honors"},{l:"Projects",t:"projects"},{l:"Contact",t:"contact"}].map(n=>(
         <li key={n.l} className="nav-link" style={{fontSize:"0.88rem",fontWeight:500,color:"var(--ts)",cursor:"pointer",textTransform:"uppercase",letterSpacing:"0.12em",transition:"color 0.3s"}} onClick={()=>scr(n.t)} onMouseEnter={e=>e.target.style.color="var(--p)"} onMouseLeave={e=>e.target.style.color="var(--ts)"}>{n.l}</li>
       ))}
       <li className="nav-cta"><CB onClick={()=>scr("contact")} label="Connect"/></li>
     </ul>
   </nav>)
 }
 
 /* === Hero === */
 function Hero(){
   const scr=(id)=>document.getElementById(id)?.scrollIntoView({behavior:"smooth"});
   return(<section id="hero" style={{position:"relative",minHeight:"100vh",display:"flex",flexDirection:"column",overflow:"hidden",paddingTop:"120px"}}>
      <video id="hero-video" autoPlay loop muted playsInline preload="metadata" style={{position:"absolute",inset:0,width:"100%",height:"100%",objectFit:"cover",zIndex:0}}>
        <source src="https://d8j0ntlcm91z4.cloudfront.net/user_38xzZboKViGWJOttwIXH07lWA1P/hf_20260429_114316_1c7889ad-2885-410e-b493-98119fee0ddb.mp4" type="video/mp4"/>
      </video>
      <div style={{position:"absolute",inset:0,background:"linear-gradient(180deg, rgba(238,242,236,0.15) 0%, rgba(238,242,236,0) 40%, rgba(238,242,236,0) 60%, rgba(238,242,236,0.08) 100%)",zIndex:1}}/>
     <div style={{position:"absolute",inset:0,zIndex:0,overflow:"hidden"}}>
       {[0,1,2,3,4,5].map(i=>React.createElement("div",{key:i,className:"hero-shape",style:{position:"absolute",width:25+i*12,height:25+i*12,border:"1.5px solid rgba(107,191,138,"+(0.12+i*0.03)+")",borderRadius:"50%",top:(12+i*12)+"%",left:(3+i*16)+"%",animation:"spin "+(12+i*4)+"s linear infinite",opacity:0.5,willChange:"transform"}}))}
       <div className="hero-shape" style={{position:"absolute",width:"300px",height:"300px",borderRadius:"50%",border:"1.5px solid rgba(107,191,138,0.06)",top:"60%",right:"8%",animation:"spin 25s linear infinite reverse"}}/>
     </div>
     <div style={{position:"relative",zIndex:1,flex:1,display:"flex",flexDirection:"column",justifyContent:"center",maxWidth:1700,margin:"0 auto",padding:"0 60px",width:"100%"}}>
       <div className="hero-badge" style={{fontSize:"0.82rem",fontWeight:600,textTransform:"uppercase",letterSpacing:"0.25em",color:"var(--p)",marginBottom:"10px"}}>Cross-Border E-Commerce</div>
       <h1 className="hero-title grad" style={{fontSize:"clamp(3rem,10vw,8rem)",fontWeight:900,lineHeight:1,letterSpacing:"-0.04em",textTransform:"uppercase",marginBottom:"8px",overflow:"hidden"}}>
         {"跨境运营".split("").map((c,i)=>React.createElement("span",{key:i,className:"title-ch",style:{display:"inline-block",overflow:"hidden",verticalAlign:"top"}},React.createElement("span",{className:"title-ch-in",style:{display:"block"}},c)))}
       </h1>
       <h2 className="hero-sub" style={{fontSize:"clamp(1.2rem,3.5vw,3rem)",fontWeight:300,lineHeight:1.2,letterSpacing:"-0.02em",color:"var(--ts)",marginBottom:"40px"}}>从选品到出海 · 跨境电商学习者</h2>
       <div className="hero-cta" style={{display:"flex",gap:"16px"}}>
         <CB onClick={()=>scr("projects")} label="View Projects"/>
         <button style={{padding:"14px 40px",borderRadius:50,background:"transparent",color:"var(--tx)",fontSize:"0.85rem",fontWeight:500,border:"1.5px solid var(--bd)",cursor:"pointer",fontFamily:"inherit",textTransform:"uppercase",letterSpacing:"0.12em",transition:"all 0.3s"}} onClick={()=>scr("contact")} onMouseEnter={e=>{e.target.style.borderColor="var(--p)";e.target.style.color="var(--p)"}} onMouseLeave={e=>{e.target.style.borderColor="var(--bd)";e.target.style.color="var(--tx)"}}>Contact</button>
       </div>
     </div>
     <div className="hero-portrait" style={{display:"flex",justifyContent:"space-between",alignItems:"flex-end",padding:"0 60px 40px",maxWidth:1700,margin:"0 auto",width:"100%"}}>
       <p className="hero-tagline" style={{fontSize:"clamp(0.7rem,1.2vw,1rem)",color:"var(--ts)",fontWeight:300,textTransform:"uppercase",letterSpacing:"0.1em",maxWidth:"280px",lineHeight:1.5}}>热爱跨境电商 · 专注Shopee、Amazon、TikTok Shop运营学习与研究</p>
       <MG padding={100} strength={3}>
         <div style={{width:160,height:160,borderRadius:"50%",background:"linear-gradient(135deg, var(--pl), var(--p))",display:"flex",alignItems:"center",justifyContent:"center",border:"2px solid rgba(107,191,138,0.3)",boxShadow:"0 0 60px rgba(107,191,138,0.15)"}}>
           <div style={{fontSize:"3.5rem",fontWeight:700,color:"#fff",lineHeight:1}}>何</div>
         </div>
       </MG>
     </div>
   </section>)
 }
 
 /* === Marquee === */
 const mImgs=["https://motionsites.ai/assets/hero-space-voyage-preview-eECLH3Yc.gif","https://motionsites.ai/assets/hero-codenest-preview-Cgppc2qV.gif","https://motionsites.ai/assets/hero-vex-ventures-preview-BczMFIiw.gif","https://motionsites.ai/assets/hero-stellar-ai-v2-preview-DjvxjG3C.gif","https://motionsites.ai/assets/hero-asme-preview-B_nGDnTP.gif","https://motionsites.ai/assets/hero-transform-data-preview-Cx5OU29N.gif","https://motionsites.ai/assets/hero-vitara-preview-Cjz2QYyU.gif","https://motionsites.ai/assets/hero-terra-preview-BFjrCr7T.gif","https://motionsites.ai/assets/hero-skyelite-preview-DHaZIgUv.gif","https://motionsites.ai/assets/hero-aethera-preview-DknSlcTa.gif"];
 function Marquee(){
   const ref=useRef(null);const[speed,setSpeed]=useState(1);
   useEffect(()=>{
     const h=()=>{if(!ref.current)return;const r=ref.current.getBoundingClientRect();const v=window.innerHeight-r.top;const m=window.innerHeight+r.height;setSpeed(Math.max(0.3,Math.min(2,0.5+(Math.max(0,Math.min(1,v/m))*2))))};
     window.addEventListener("scroll",h,{passive:true});h();return()=>window.removeEventListener("scroll",h)
   },[]);
   const r1=mImgs.slice(0,11);const r2=mImgs.slice(11);
   const d1=36/speed;const d2=32/speed;
   return(<section ref={ref} style={{padding:"60px 0",overflow:"hidden",background:"var(--bg)"}}>
     <div className="marquee-label" style={{fontSize:"0.75rem",fontWeight:600,textTransform:"uppercase",letterSpacing:"0.2em",color:"var(--ts)",textAlign:"center",marginBottom:"24px",opacity:0.6}}>Featured Work</div>
     <div style={{display:"flex",gap:3,animation:"mr "+d1+"s linear infinite"}}>{[...r1,...r1].map((u,i)=><img key={i} src={u} alt="" className="marquee-img" style={{width:260,height:170,borderRadius:16,objectFit:"cover",flexShrink:0}} loading="lazy" decoding="async"/>)}</div>
     <div style={{height:8}}/>
     <div style={{display:"flex",gap:3,animation:"ml "+d2+"s linear infinite"}}>{[...r2,...r2].map((u,i)=><img key={i} src={u} alt="" className="marquee-img" style={{width:260,height:170,borderRadius:16,objectFit:"cover",flexShrink:0}} loading="lazy" decoding="async"/>)}</div>
   </section>)
 }
 
 /* === About === */
 function About(){
   return(<section id="about" style={{minHeight:"100vh",display:"flex",alignItems:"center",position:"relative",overflow:"hidden",padding:"100px 0"}}>
     <div style={{position:"absolute",inset:0,zIndex:0}}>

       <div style={{position:"absolute",width:130,height:130,borderRadius:"50%",background:"radial-gradient(circle, rgba(107,191,138,0.08), transparent)",bottom:"10%",left:"8%",animation:"flt 9s ease-in-out infinite 1.5s"}}/>
       <div style={{position:"absolute",width:180,height:180,borderRadius:"50%",background:"radial-gradient(circle, rgba(107,191,138,0.1), transparent)",top:"3%",right:"5%",animation:"flt 8s ease-in-out infinite 0.5s"}}/>
       <div style={{position:"absolute",width:150,height:150,borderRadius:"50%",background:"radial-gradient(circle, rgba(107,191,138,0.06), transparent)",bottom:"8%",right:"6%",animation:"flt 10s ease-in-out infinite 2s"}}/>
     </div>
     <div className="sc section-about" style={{position:"relative",zIndex:1,width:"100%"}}>
       <h2 className="section-title grad sec-title-hide" style={{fontSize:"clamp(2.5rem,10vw,7rem)",fontWeight:900,textTransform:"uppercase",textAlign:"center",lineHeight:1}}>About</h2>
       <div className="about-grid" style={{display:"grid",gridTemplateColumns:"1fr 1.4fr",gap:"80px",alignItems:"center",marginTop:"60px"}}>
         <div className="about-portrait"><MG padding={140} strength={4}>
           <div style={{width:320,height:380,borderRadius:24,background:"linear-gradient(135deg, var(--pl), var(--p))",display:"flex",alignItems:"center",justifyContent:"center",position:"relative",overflow:"hidden"}}>
             <div style={{position:"absolute",inset:0,background:"linear-gradient(135deg, transparent 40%, rgba(255,255,255,0.1) 100%)"}}/>
             <img src="portrait.jpg" alt="" style={{width:"100%",height:"100%",objectFit:"cover",borderRadius:24,transition:"transform 0.6s cubic-bezier(0.22,1,0.36,1)"}} onMouseEnter={e=>e.currentTarget.style.transform="scale(1.06)"} onMouseLeave={e=>e.currentTarget.style.transform="scale(1)"}/>
           </div></MG>
         </div>
         <div>
           <div className="about-text"><h3 style={{fontSize:"1.6rem",fontWeight:600,marginBottom:"16px",color:"var(--tx)"}}>跨境电商运营助理</h3>
           <p style={{fontSize:"1rem",color:"var(--ts)",lineHeight:2,marginBottom:"12px"}}>山东工商学院 | 电子信息工程专业2026届本科。具备数据分析与逻辑思维基础，熟练运用Excel，了解Python、SQL等数据分析工具。</p>
                <p style={{fontSize:"1rem",color:"var(--ts)",lineHeight:2,marginBottom:"12px"}}>自学Shopee、Amazon、TikTok Shop等主流跨境平台的运营体系与增长逻辑，完成10+头部品牌的行业分析与全链路运营SOP梳理作为学习成果。</p>
                <p style={{fontSize:"1rem",color:"var(--ts)",lineHeight:2,marginBottom:"12px"}}>英语四级（考研英语80分），具备跨境Listing文案与英文邮件撰写基础。善于用数据分析思维发现问题，以方法论指导学习。</p>
                <p style={{fontSize:"1rem",color:"var(--ts)",lineHeight:2}}>作为跨境电商的积极学习者，非常渴望获得面试机会，愿意从零开始深入学习，一步步成长为专业的跨境电商运营人。</p></div>
           <div className="about-stats">
           {[{n:"4年",l:"山东工商学院·电子信息工程"},{n:"CET-4",l:"考研英语80分·六级已考"},{n:"10+",l:"品牌案例拆解·SOP构建"}].map(d=>(
             <div key={d.l} style={{textAlign:"center",padding:"20px",borderRadius:16,border:"1px solid var(--bd)",background:"rgba(107,191,138,0.04)"}}>
               <div style={{fontSize:"2rem",fontWeight:700,color:"var(--p)",marginBottom:"2px",fontFamily:"Kanit"}}>{d.n}</div>
               <div style={{fontSize:"0.8rem",color:"var(--ts)",letterSpacing:"0.05em"}}>{d.l}</div>
             </div>
           ))}</div>
         </div>
       </div>
     </div>
   </section>)
 }
 
 /* === Skills === */

/* === Honors === */
function Honors(){
  return(<section className="lazy-section" id="honors" style={{background:"#E6EBE4",borderRadius:"40px 40px 0 0",padding:"100px 0",position:"relative",zIndex:2,overflow:"hidden"}}>
    <div style={{position:"absolute",inset:0,background:"linear-gradient(135deg, rgba(28,46,40,0.75), rgba(107,191,138,0.3)), url(running.jpg) center/cover",zIndex:0}}/>

 <!-- GSAP Animation Engine -->
 <script>
 (function(){
 var $ = gsap.utils.toArray;
 gsap.registerPlugin(ScrollTrigger);
 
 // Wait for React + curtain ready
 var obs = new MutationObserver(function(m, o){
   var c = document.getElementById("curtain");
   var root = document.getElementById("root");
   if(c && root && root.children.length > 0) {
     o.disconnect();
     initAnimations(c);
   }
 });
 try{obs.observe(document.getElementById("root")||document.body,{childList:true,subtree:true})}catch(e){initAnimations(document.getElementById("curtain"))} 
 function initAnimations(curtain){
   var tl = gsap.timeline({defaults:{ease:"power4.inOut"}});
   
   // === OPENING ===
   // Phase 1: Curtain slide up
   tl.to(curtain, {yPercent:-100, duration:1.0, ease:"power4.inOut", delay:0.3});
   // Phase 2: Rotating shapes fade in
   tl.fromTo(".hero-shape", {opacity:0, scale:0.3}, {opacity:0.5, scale:1, duration:0.6, stagger:0.05, ease:"power3.out"}, "-=0.6");
   // Phase 3: Title characters - compression reveal
   tl.fromTo(".title-ch-in", {scaleY:0.1, y:80, opacity:0}, {scaleY:1, y:0, opacity:1, duration:0.9, stagger:0.08, ease:"power4.out"}, "-=0.4");
   // Phase 4: Badge + subtitle + CTA stagger
   tl.fromTo(".hero-badge", {y:30, opacity:0}, {y:0, opacity:1, duration:0.8, ease:"power3.out"}, "-=0.3");
   tl.fromTo(".hero-sub", {y:40, opacity:0}, {y:0, opacity:1, duration:0.9, ease:"power3.out"}, "-=0.2");
   tl.fromTo(".hero-cta > *", {y:30, opacity:0}, {y:0, opacity:1, duration:0.8, stagger:0.12, ease:"power3.out"}, "-=0.3");
   // Phase 5: Portrait + tagline
   tl.fromTo(".hero-portrait", {y:40, opacity:0}, {y:0, opacity:1, duration:1, ease:"power3.out"}, "-=0.2");
   // Phase 6: Navbar links
   tl.fromTo(".navbar-logo, .nav-link, .nav-cta", {y:-20, opacity:0}, {y:0, opacity:1, duration:0.6, stagger:0.06, ease:"power2.out"}, "-=0.5");
   // Phase 7: Curtain gone
   tl.to(curtain, {autoAlpha:0, duration:0.3, onComplete:function(){curtain.style.display="none"}});
   
   // === SCROLL TRIGGERS ===
   // Section titles: dramatic zoom-in
   $(".section-title").forEach(function(el) {
     gsap.fromTo(el, {scale:0.4, y:80, opacity:0}, {
       scale:1, y:0, opacity:1, duration:1.0, ease:"power3.out",
       scrollTrigger: {trigger:el.parentElement, start:"top 75%", toggleActions:"play none none reverse"}
     });
   });
   
   // About section: stagger
   $(".about-portrait, .about-text, .about-stats").forEach(function(el) {
     gsap.fromTo(el, {y:60, opacity:0}, {
       y:0, opacity:1, duration:1, ease:"power2.out",
       scrollTrigger: {trigger:el.closest(".about-grid"), start:"top 75%", toggleActions:"play none none reverse"}
     });
   });
   
   // Skills: stagger cards
   $(".skill-item").forEach(function(el, i) {
     gsap.fromTo(el, {y:40, opacity:0}, {

     });
   });
   
   // Project cards: stagger entry
   $(".project-card-wrap").forEach(function(wrap, i) {
     gsap.fromTo(wrap, {y:80, opacity:0}, {
       y:0, opacity:1, duration:1, delay:i*0.2, ease:"power3.out",

    // Honors: stagger

     });
   });
   
   // Clean up curtain
   curtain.classList.add("is-open");
 }
